<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a2640;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  canvas {
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.1);
    display: block;
    cursor: pointer;
    max-width: 100%;
  }
  #info {
    margin-top: 14px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<canvas id="fb-canvas" width="360" height="540"></canvas>
<div id="info">Tap or press Space / ↑ to flap</div>

<script>
(function () {
  const canvas = document.getElementById('fb-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const BIRD_X = 80, BIRD_R = 14;
  const PIPE_W = 52, GAP = 140, PIPE_SPEED = 2.6;
  const GRAVITY = 0.38, FLAP = -7.5;
  const PIPE_INTERVAL = 90;

  let state, raf;

  function init() {
    state = {
      bird: { y: H / 2, vy: 0, rot: 0 },
      pipes: [],
      frame: 0,
      score: 0,
      best: state ? state.best : 0,
      phase: 'idle',
      groundX: 0
    };
  }

  function flap() {
    if (state.phase === 'idle') state.phase = 'play';
    if (state.phase === 'play') state.bird.vy = FLAP;
    if (state.phase === 'dead') { init(); state.phase = 'idle'; }
  }

  canvas.addEventListener('click', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });

  function addPipe() {
    const topH = 60 + Math.random() * (H - GAP - 120 - 80);
    state.pipes.push({ x: W + PIPE_W, topH });
  }

  function update() {
    if (state.phase !== 'play') return;
    state.frame++;
    state.groundX = (state.groundX - PIPE_SPEED) % 40;

    state.bird.vy += GRAVITY;
    state.bird.y += state.bird.vy;
    state.bird.rot = Math.max(-25, Math.min(80, state.bird.vy * 4));

    if (state.frame % PIPE_INTERVAL === 0) addPipe();
    state.pipes.forEach(p => p.x -= PIPE_SPEED);
    state.pipes = state.pipes.filter(p => p.x > -PIPE_W - 10);

    state.pipes.forEach(p => {
      if (!p.scored && p.x + PIPE_W < BIRD_X - BIRD_R) {
        p.scored = true;
        state.score++;
        document.getElementById('info').textContent = 'Score: ' + state.score;
      }
    });

    const bx = BIRD_X, by = state.bird.y;
    if (by + BIRD_R > H - 50 || by - BIRD_R < 0) { die(); return; }
    for (const p of state.pipes) {
      if (bx + BIRD_R - 4 > p.x && bx - BIRD_R + 4 < p.x + PIPE_W) {
        if (by - BIRD_R + 4 < p.topH || by + BIRD_R - 4 > p.topH + GAP) { die(); return; }
      }
    }
  }

  function die() {
    state.phase = 'dead';
    if (state.score > state.best) state.best = state.score;
  }

  function drawBird(x, y, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot * Math.PI / 180);

    ctx.fillStyle = '#F5C842';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_R, BIRD_R - 2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#E8A820';
    ctx.beginPath();
    ctx.ellipse(-2, 3, 8, 5, -0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#FDEEA0';
    ctx.beginPath();
    ctx.ellipse(3, 2, 7, 6, 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(6, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(7, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(8, -5, 1, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#E85C1A';
    ctx.beginPath();
    ctx.moveTo(10, -1);
    ctx.lineTo(17, 1);
    ctx.lineTo(10, 3);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawPipe(x, topH) {
    const pipeGreen = '#4CAF50';
    const pipeEdge = '#388E3C';
    const capH = 28, capExtra = 6;

    ctx.fillStyle = pipeGreen;
    ctx.fillRect(x, 0, PIPE_W, topH - capH);
    ctx.fillStyle = pipeEdge;
    ctx.fillRect(x - capExtra / 2, topH - capH, PIPE_W + capExtra, capH);
    ctx.fillStyle = '#66BB6A';
    ctx.fillRect(x + 6, 0, 8, topH - capH);

    const botY = topH + GAP;
    const botH = H - 50 - botY;
    ctx.fillStyle = pipeGreen;
    ctx.fillRect(x, botY + capH, PIPE_W, botH - capH);
    ctx.fillStyle = pipeEdge;
    ctx.fillRect(x - capExtra / 2, botY, PIPE_W + capExtra, capH);
    ctx.fillStyle = '#66BB6A';
    ctx.fillRect(x + 6, botY + capH, 8, botH - capH);
  }

  function drawGround() {
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(0, H - 50, W, 50);
    ctx.fillStyle = '#C8A060';
    ctx.fillRect(0, H - 50, W, 8);
    ctx.fillStyle = '#E8C878';
    for (let i = 0; i < 12; i++) {
      const sx = ((state.groundX + i * 40) % (W + 40)) - 20;
      ctx.fillRect(sx, H - 50, 20, 8);
    }
    ctx.fillStyle = '#5DBB5D';
    ctx.fillRect(0, H - 50, W, 5);
  }

  function drawSky() {
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    [[80, 80, 40], [200, 120, 30], [300, 70, 50]].forEach(([cx, cy, r]) => {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + r * 0.6, cy + 5, r * 0.7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - r * 0.6, cy + 5, r * 0.6, 0, Math.PI * 2); ctx.fill();
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawUI() {
    if (state.phase === 'idle') {
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.font = '700 30px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Flappy Bird', W / 2, H / 2 - 20);
      ctx.font = '400 16px -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillText('Tap or press Space to start', W / 2, H / 2 + 16);
    }

    if (state.phase === 'dead') {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(0, 0, W, H);

      const cw = 230, ch = 140, cx = (W - cw) / 2, cy = H / 2 - 75;
      ctx.fillStyle = '#fff';
      roundRect(cx, cy, cw, ch, 14);
      ctx.fill();

      ctx.fillStyle = '#222';
      ctx.font = '700 22px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', W / 2, cy + 40);
      ctx.font = '400 15px -apple-system, sans-serif';
      ctx.fillStyle = '#666';
      ctx.fillText('Score: ' + state.score + '   Best: ' + state.best, W / 2, cy + 72);

      ctx.fillStyle = '#4CAF50';
      roundRect((W - 140) / 2, cy + 92, 140, 36, 8);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '600 15px -apple-system, sans-serif';
      ctx.fillText('Tap to restart', W / 2, cy + 115);
    }

    if (state.phase === 'play') {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.font = '700 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(state.score, W / 2 + 2, 54);
      ctx.fillStyle = '#fff';
      ctx.fillText(state.score, W / 2, 52);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    state.pipes.forEach(p => drawPipe(p.x, p.topH));
    drawGround();
    drawBird(BIRD_X, state.bird.y, state.bird.rot);
    drawUI();
  }

  function loop() {
    update();
    if (state.phase === 'idle') {
      state.bird.y = H / 2 + Math.sin(Date.now() / 400) * 8;
    }
    draw();
    requestAnimationFrame(loop);
  }

  init();
  loop();
})();
</script>
</body>
</html>
