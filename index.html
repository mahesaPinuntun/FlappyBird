
<style>
  #fb-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 1rem 0; font-family: var(--font-sans); }
  #fb-canvas { border-radius: 12px; border: 0.5px solid var(--border-strong); display: block; cursor: pointer; }
  #fb-info { font-size: 13px; color: var(--text-secondary); }
  #fb-best { font-size: 13px; color: var(--text-muted); }
</style>

<div id="fb-wrap">
  <canvas id="fb-canvas" width="360" height="540"></canvas>
  <div id="fb-info">Tap or press Space / ↑ to flap</div>
  <div id="fb-best">Best: 0</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('fb-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const isDark = () => document.documentElement.getAttribute('data-mode') === 'dark'
    || window.matchMedia('(prefers-color-scheme: dark)').matches;

  const BIRD_X = 80, BIRD_R = 14;
  const PIPE_W = 52, GAP = 140, PIPE_SPEED = 2.6;
  const GRAVITY = 0.38, FLAP = -7.5;
  const PIPE_INTERVAL = 90;

  let state, raf;

  function init() {
    state = {
      bird: { y: H / 2, vy: 0, rot: 0 },
      pipes: [],
      frame: 0,
      score: 0,
      best: state ? state.best : 0,
      phase: 'idle', // idle | play | dead
      groundX: 0
    };
  }

  function flap() {
    if (state.phase === 'idle') { state.phase = 'play'; }
    if (state.phase === 'play') { state.bird.vy = FLAP; }
    if (state.phase === 'dead') { init(); state.phase = 'idle'; }
  }

  canvas.addEventListener('click', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });

  function addPipe() {
    const topH = 60 + Math.random() * (H - GAP - 120 - 80);
    state.pipes.push({ x: W + PIPE_W, topH });
  }

  function update() {
    if (state.phase !== 'play') return;
    state.frame++;
    state.groundX = (state.groundX - PIPE_SPEED) % 40;

    // bird
    state.bird.vy += GRAVITY;
    state.bird.y += state.bird.vy;
    state.bird.rot = Math.max(-25, Math.min(80, state.bird.vy * 4));

    // pipes
    if (state.frame % PIPE_INTERVAL === 0) addPipe();
    state.pipes.forEach(p => p.x -= PIPE_SPEED);
    state.pipes = state.pipes.filter(p => p.x > -PIPE_W - 10);

    // score
    state.pipes.forEach(p => {
      if (!p.scored && p.x + PIPE_W < BIRD_X - BIRD_R) {
        p.scored = true;
        state.score++;
        document.getElementById('fb-info').textContent = 'Score: ' + state.score;
      }
    });

    // collisions
    const bx = BIRD_X, by = state.bird.y;
    // ground / ceiling
    if (by + BIRD_R > H - 50 || by - BIRD_R < 0) { die(); return; }
    // pipes
    for (const p of state.pipes) {
      if (bx + BIRD_R - 4 > p.x && bx - BIRD_R + 4 < p.x + PIPE_W) {
        if (by - BIRD_R + 4 < p.topH || by + BIRD_R - 4 > p.topH + GAP) { die(); return; }
      }
    }
  }

  function die() {
    state.phase = 'dead';
    if (state.score > state.best) {
      state.best = state.score;
      document.getElementById('fb-best').textContent = 'Best: ' + state.best;
    }
  }

  function drawBird(x, y, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot * Math.PI / 180);

    // body
    ctx.fillStyle = '#F5C842';
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_R, BIRD_R - 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // wing
    ctx.fillStyle = '#E8A820';
    ctx.beginPath();
    ctx.ellipse(-2, 3, 8, 5, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // belly
    ctx.fillStyle = '#FDEEA0';
    ctx.beginPath();
    ctx.ellipse(3, 2, 7, 6, 0.2, 0, Math.PI * 2);
    ctx.fill();

    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(6, -4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(7, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(8, -5, 1, 0, Math.PI * 2);
    ctx.fill();

    // beak
    ctx.fillStyle = '#E85C1A';
    ctx.beginPath();
    ctx.moveTo(10, -1);
    ctx.lineTo(17, 1);
    ctx.lineTo(10, 3);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawPipe(x, topH) {
    const dark = isDark();
    const pipeGreen = dark ? '#2D7A3A' : '#4CAF50';
    const pipeEdge = dark ? '#1E5C28' : '#388E3C';
    const capH = 28;
    const capExtra = 6;

    // top pipe
    ctx.fillStyle = pipeGreen;
    ctx.fillRect(x, 0, PIPE_W, topH - capH);
    ctx.fillStyle = pipeEdge;
    ctx.fillRect(x - capExtra/2, topH - capH, PIPE_W + capExtra, capH);
    // pipe highlight
    ctx.fillStyle = dark ? '#3A9944' : '#66BB6A';
    ctx.fillRect(x + 6, 0, 8, topH - capH);

    // bottom pipe
    const botY = topH + GAP;
    const botH = H - 50 - botY;
    ctx.fillStyle = pipeGreen;
    ctx.fillRect(x, botY + capH, PIPE_W, botH - capH);
    ctx.fillStyle = pipeEdge;
    ctx.fillRect(x - capExtra/2, botY, PIPE_W + capExtra, capH);
    ctx.fillStyle = dark ? '#3A9944' : '#66BB6A';
    ctx.fillRect(x + 6, botY + capH, 8, botH - capH);
  }

  function drawGround() {
    const dark = isDark();
    ctx.fillStyle = dark ? '#5C4A2A' : '#DEB887';
    ctx.fillRect(0, H - 50, W, 50);
    ctx.fillStyle = dark ? '#4A3A1E' : '#C8A060';
    ctx.fillRect(0, H - 50, W, 8);
    // stripes
    ctx.fillStyle = dark ? '#6B5530' : '#E8C878';
    for (let i = 0; i < 12; i++) {
      const sx = ((state.groundX + i * 40) % (W + 40)) - 20;
      ctx.fillRect(sx, H - 50, 20, 8);
    }
    // grass top
    ctx.fillStyle = dark ? '#3A7A3A' : '#5DBB5D';
    ctx.fillRect(0, H - 50, W, 5);
  }

  function drawSky() {
    const dark = isDark();
    if (dark) {
      ctx.fillStyle = '#1a2640';
    } else {
      ctx.fillStyle = '#87CEEB';
    }
    ctx.fillRect(0, 0, W, H);
    if (!dark) {
      // clouds
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      [[80,80,40],[200,120,30],[300,70,50]].forEach(([cx,cy,r]) => {
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+r*0.6, cy+5, r*0.7, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx-r*0.6, cy+5, r*0.6, 0, Math.PI*2); ctx.fill();
      });
    } else {
      // stars
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      [[50,40],[150,70],[280,30],[330,90],[60,140],[220,110]].forEach(([sx,sy]) => {
        ctx.fillRect(sx, sy, 2, 2);
      });
    }
  }

  function drawUI() {
    const dark = isDark();
    if (state.phase === 'idle') {
      ctx.fillStyle = dark ? 'rgba(0,0,0,0.45)' : 'rgba(0,0,0,0.25)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.font = '600 28px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText('Flappy Bird', W/2, H/2 - 20);
      ctx.font = '400 16px ' + getComputedStyle(document.body).fontFamily;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText('Tap or press Space to start', W/2, H/2 + 16);
    }
    if (state.phase === 'dead') {
      ctx.fillStyle = dark ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.35)';
      ctx.fillRect(0, 0, W, H);

      // card
      ctx.fillStyle = dark ? '#1e2a3a' : '#fff';
      const cw = 220, ch = 130, cx = (W-cw)/2, cy = H/2 - 70;
      ctx.beginPath();
      ctx.roundRect(cx, cy, cw, ch, 14);
      ctx.fill();
      ctx.strokeStyle = dark ? '#334' : '#ddd';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      ctx.fillStyle = dark ? '#eee' : '#222';
      ctx.font = '600 22px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', W/2, cy + 38);
      ctx.font = '400 15px ' + getComputedStyle(document.body).fontFamily;
      ctx.fillStyle = dark ? '#aaa' : '#666';
      ctx.fillText('Score: ' + state.score + '   Best: ' + state.best, W/2, cy + 68);

      ctx.fillStyle = '#4CAF50';
      ctx.beginPath();
      ctx.roundRect((W-130)/2, cy + 86, 130, 34, 8);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '500 15px ' + getComputedStyle(document.body).fontFamily;
      ctx.fillText('Tap to restart', W/2, cy + 108);
    }

    if (state.phase === 'play') {
      ctx.fillStyle = dark ? '#fff' : '#1a1a1a';
      ctx.font = '700 32px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(state.score, W/2, 52);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    state.pipes.forEach(p => drawPipe(p.x, p.topH));
    drawGround();
    drawBird(BIRD_X, state.bird.y, state.bird.rot);
    drawUI();
  }

  function loop() {
    update();
    // idle bird bob
    if (state.phase === 'idle') {
      state.bird.y = H/2 + Math.sin(Date.now()/400) * 8;
    }
    draw();
    raf = requestAnimationFrame(loop);
  }

  init();
  loop();
})();
</script>
